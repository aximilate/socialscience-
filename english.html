<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Текстовый суфлер</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        /* Начальный экран */
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        textarea {
            width: 80%;
            height: 200px;
            padding: 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Экран чтения */
        #display-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background-color: black;
            color: white;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
        }

        #content-text {
            width: 90%;
            word-wrap: break-word;
            user-select: none;
        }

        .hidden {
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Настройка текста</h1>
        <textarea id="input-text" placeholder="Введите текст здесь... Каждая новая строка — новый слайд."></textarea>
        
        <div class="controls">
            <label>Размер шрифта (px): 
                <input type="number" id="font-size" value="100" min="10" max="400">
            </label>
            <button onclick="toggleFullScreen()">Полноэкранный режим</button>
            <button onclick="startPresentation()" style="background-color: #28a745;">Запустить</button>
        </div>
        <p><small>Управление: Пробел — скрыть/показать текст, Стрелки — листать.</small></p>
    </div>

    <div id="display-screen">
        <div id="content-text" class="hidden"></div>
    </div>

    <script>
        let lines = [];
        let currentIndex = 0;
        let isTextVisible = false;

        const setupScreen = document.getElementById('setup-screen');
        const displayScreen = document.getElementById('display-screen');
        const contentText = document.getElementById('content-text');
        const inputText = document.getElementById('input-text');
        const fontSizeInput = document.getElementById('font-size');

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function startPresentation() {
            const rawText = inputText.value.trim();
            if (!rawText) return alert("Введите текст!");

            // Разбиваем текст на строки (слайды)
            lines = rawText.split('\n').filter(line => line.trim() !== "");
            currentIndex = 0;
            isTextVisible = false;

            // Настройка стилей
            contentText.style.fontSize = fontSizeInput.value + 'px';
            updateText();

            // Переключение экранов
            setupScreen.style.display = 'none';
            displayScreen.style.display = 'flex';
            contentText.classList.add('hidden'); // Сначала экран черный
        }

        function updateText() {
            if (lines.length > 0) {
                contentText.innerText = lines[currentIndex];
            }
        }

        document.addEventListener('keydown', (e) => {
            if (displayScreen.style.display === 'flex') {
                
                // Пробел — переключает видимость
                if (e.code === 'Space') {
                    e.preventDefault();
                    isTextVisible = !isTextVisible;
                    if (isTextVisible) {
                        contentText.classList.remove('hidden');
                    } else {
                        contentText.classList.add('hidden');
                    }
                }

                // Стрелки — навигация (только если текст виден или по логике суфлера)
                if (e.code === 'ArrowRight' || e.code === 'ArrowDown') {
                    if (currentIndex < lines.length - 1) {
                        currentIndex++;
                        updateText();
                    }
                }
                if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') {
                    if (currentIndex > 0) {
                        currentIndex--;
                        updateText();
                    }
                }

                // Escape — выход в меню
                if (e.code === 'Escape') {
                    displayScreen.style.display = 'none';
                    setupScreen.style.display = 'flex';
                }
            }
        });
    </script>
</body>
</html>
